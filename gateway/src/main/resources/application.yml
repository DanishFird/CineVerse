server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        - id: movie-service
          uri: http://localhost:8082
          predicates:
            - Path=/movies/**,/reviews/**

        - id: booking-service
          uri: http://localhost:8083
          predicates:
            - Path=/theatres/**,/shows/**,/seats/**,/booking/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

jwt:
  secret: cineverse-super-secret-jwt-key-that-is-at-least-256-bits-long-for-hs256

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
