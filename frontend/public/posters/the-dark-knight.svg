<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 750" role="img" aria-labelledby="title desc">
  <title id="title">The Dark Knight poster</title>
  <desc id="desc">A cinematic Gotham skyline poster for The Dark Knight.</desc>
  <defs>
