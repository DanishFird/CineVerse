    <rect x="155" y="460" width="46" height="190"/>
    <rect x="223" y="500" width="54" height="150"/>
    <rect x="300" y="430" width="44" height="220"/>
    <rect x="365" y="485" width="50" height="165"/>
  </g>
  <g fill="#86d6ff" opacity="0.35">
