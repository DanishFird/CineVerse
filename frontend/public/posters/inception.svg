<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 750" role="img" aria-labelledby="title desc">
  <title id="title">Inception poster</title>
  <desc id="desc">A cinematic blue city maze poster for Inception.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.48" stop-color="#132b4a"/>
      <stop offset="1" stop-color="#05070c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd36a"/>
      <stop offset="1" stop-color="#ff8a00"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="4"/>
