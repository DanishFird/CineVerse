  </defs>
  <rect width="500" height="750" fill="url(#bg)"/>
  <circle cx="250" cy="225" r="170" fill="#1f6f9f" opacity="0.22" filter="url(#soft)"/>
  <g fill="none" stroke="#8cc7e8" stroke-width="8" opacity="0.8">
    <path d="M70 560V170h360v390"/>
    <path d="M105 525V205h290v320"/>
