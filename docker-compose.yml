version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cineverse-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_MULTIPLE_DATABASES: "cineverse_auth,cineverse_booking"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-postgres.sh:/docker-entrypoint-initdb.d/init.sh
    networks:
      - cineverse-net

  mongodb:
    image: mongo:6-jammy
    container_name: cineverse-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - cineverse-net

  redis:
    image: redis:7-alpine
    container_name: cineverse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - cineverse-net

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: cineverse-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - cineverse-net

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  rabbitmq-data:

networks:
  cineverse-net:
    driver: bridge
